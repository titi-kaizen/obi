version: '3.9'

services:
  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: ogasci-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Redis UI (local dev only) ──────────────────────────────
  redis-ui:
    image: redislabs/redisinsight:latest
    container_name: ogasci-redis-ui
    ports:
      - '5540:5540'
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

  # ── OBI Intelligence (Python FastAPI) ────────────────────
  intelligence-api:
    build:
      context: ./apps/intelligence
      dockerfile: Dockerfile
    container_name: obi-intelligence-api
    ports:
      - '8000:8000'
    env_file:
      - ./apps/intelligence/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Celery Worker (scraping queue) ────────────────────────
  celery-scraper:
    build:
      context: ./apps/intelligence
      dockerfile: Dockerfile
    container_name: obi-celery-scraper
    command: celery -A celery_worker worker --loglevel=info -Q scrape -c 8 --without-heartbeat
    env_file:
      - ./apps/intelligence/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Worker (AI pipeline queue) ────────────────────
  celery-pipeline:
    build:
      context: ./apps/intelligence
      dockerfile: Dockerfile
    container_name: obi-celery-pipeline
    command: celery -A celery_worker worker --loglevel=info -Q pipeline -c 4 --without-heartbeat
    env_file:
      - ./apps/intelligence/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery Beat (scheduler) ───────────────────────────────
  celery-beat:
    build:
      context: ./apps/intelligence
      dockerfile: Dockerfile
    container_name: obi-celery-beat
    command: celery -A celery_worker beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    env_file:
      - ./apps/intelligence/.env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Flower (Celery monitoring) ────────────────────────────
  flower:
    build:
      context: ./apps/intelligence
      dockerfile: Dockerfile
    container_name: obi-flower
    command: celery -A celery_worker flower --port=5555 --basic_auth=admin:obi2025
    ports:
      - '5555:5555'
    env_file:
      - ./apps/intelligence/.env
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools
    restart: unless-stopped

volumes:
  redis_data:

# NOTE: PostgreSQL is provided by Supabase Cloud (or Supabase CLI local dev).
# For full local Supabase stack run: npx supabase start
# This spins up: postgres, auth, storage, realtime, studio on localhost:54323
